<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My Love</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  overflow: hidden;
  background: linear-gradient(to bottom right, #ffe6f0, #fff);
}

/* Intro */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(to bottom right, #ff99cc, #fff);
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 10;
}

#intro h1 {
  color: white;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  50% { transform: scale(1.1); }
}

/* Container */
.container {
  display: none;
  height: 100vh;
  overflow-y: auto;
  justify-content: center;
  align-items: center;
}

/* Letter */
.letter {
  background: white;
  padding: 40px;
  max-width: 600px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  line-height: 1.8;
  font-size: 18px;
  margin: 20px;
}

h1 {
  text-align: center;
  color: #ff4d88;
}

.signature {
  text-align: right;
  margin-top: 30px;
  font-style: italic;
}

/* Cursor */
.cursor {
  display: inline-block;
  width: 2px;
  background: black;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

/* Flowers */
.flower {
  position: absolute;
  bottom: -20px;
  font-size: 24px;
  animation: float 8s linear infinite;
}

@keyframes float {
  to {
    transform: translateY(-110vh);
    opacity: 0;
  }
}

/* Gallery */
#gallery {
  opacity: 0;
  transition: opacity 2s ease;
  margin-top: 30px;
  text-align: center;
}

#gallery img {
  width: 100%;
  border-radius: 10px;
  margin-top: 10px;
}

</style>
</head>

<body>

<!-- Intro -->
<div id="intro" onclick="openLetter()">
  <h1>Tap to open my letter 💌</h1>
</div>

<!-- Music -->
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<!-- Main -->
<div class="container" id="main">
  <div class="letter">

    <h1 id="title"></h1>
    <p id="p1"></p>
    <p id="p2"></p>
    <p id="p3"></p>
    <p id="p4"></p>
    <p id="p5"></p>
    <p id="p6"></p>

    <div class="signature" id="sign"></div>

    <!-- Gallery -->
    <div id="gallery">
      <h2 style="color:#ff4d88;">Our Memories 💖</h2>

      <img src="8b420ffb-abed-4167-9440-5da32127c175.jpeg">
      <img src="32ba96cb-561c-411e-9d34-da1b0a767d68.jpeg">
      <img src="f3a5e78a-adcd-4b84-84b7-a47b8c7a3abc.jpeg">
      <img src="bee974ba-76dc-45e1-807b-0cd4b11c8ce1.jpeg">
      <img src="1a001183-6fc0-47d7-88b7-71aaf3ab51fc.jpeg">
      <img src="73df39ba-094e-4d52-bcf4-212db2264c6c.jpeg">
    </div>

  </div>
</div>

<script>
const text = [
  ["title","My Mark Baby ko"],
  ["p1","I hope you'll appreciate this HEHEHE"],
  ["p2","I just wanna say that I would rather endure the pain of loving you, as long as you're there, than feel nothing at all without you. For you, I would do everything."],
  ["p3","I know there's a difference between being alone and having you in my life. And if I ever lost you, I feel like I would lose a part of myself too, the dreams we shared, the future we built and imagined together. I don’t even know how I would go back to the version of me who didn’t know you existed."],
  ["p4","I love you. And this time, just like you, I will prioritize the things that truly matter, not just for me, but for us. I want to prove, even to your parents, that I can give you the life you deserve when the time comes for us to be together under the same roof. And about what you always say, that I deserve someone better, why can’t you just become better for me instead not now, but eventually diba?"],
  ["p5","I will never regret knowing you. I will never regret loving you. I assure you that you have my whole love, my loyalty, and everything. There is no one else for me, it’s only you, my baby boy."],
  ["p6","I love you always and in all ways. I love you entirely and completely. Things may be hard sometimes, but together we will figure things out."],
  ["sign","Forever yours."]
];

function type(el, txt, speed=30){
  return new Promise(res=>{
    let i=0;
    let cur=document.createElement("span");
    cur.className="cursor";
    el.appendChild(cur);

    function t(){
      if(i<txt.length){
        el.insertBefore(document.createTextNode(txt[i]),cur);
        i++;
        setTimeout(t,speed);
      } else {
        cur.remove();
        res();
      }
    }
    t();
  });
}

async function start(){
  for(let i of text){
    await type(document.getElementById(i[0]),i[1]);
    await new Promise(r=>setTimeout(r,400));
  }

  // reveal images
  setTimeout(()=>{
    document.getElementById("gallery").style.opacity=1;
  },800);
}

function openLetter(){
  document.getElementById("intro").style.display="none";
  document.getElementById("main").style.display="flex";
  document.getElementById("music").play();
  start();

  // flowers
  const f=["🌸","🌷","🌹","💐","🌺"];
  setInterval(()=>{
    let e=document.createElement("div");
    e.className="flower";
    e.innerHTML=f[Math.floor(Math.random()*f.length)];
    e.style.left=Math.random()*100+"vw";
    document.body.appendChild(e);
    setTimeout(()=>e.remove(),8000);
  },300);
}
</script>

</body>
</html>
